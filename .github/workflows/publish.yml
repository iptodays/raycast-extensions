name: Publish

on:
  push:
    branches: [main]
    paths: ['dev-utils/**']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dev-utils/package-lock.json
      - run: npm ci
        working-directory: dev-utils
      - run: npm run build
        working-directory: dev-utils
      - run: npx @raycast/api@latest publish
        working-directory: dev-utils
        env:
          RAYCAST_TOKEN: ${{ secrets.RAYCAST_TOKEN }}
